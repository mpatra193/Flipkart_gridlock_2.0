name: Deploy to EC2

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create GitHub Deployment
        id: deployment
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'Production (EC2)',
              description: 'Deploying to AWS EC2',
              auto_merge: false,
              required_contexts: [],
            });
            core.setOutput('deployment_id', deployment.data.id);

      - name: Deploy over SSH
        id: deploy
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY_B64: ${{ secrets.EC2_SSH_KEY_B64 }}
        run: |
          set -euo pipefail

          # Skip if secrets are not configured yet
          if [ -z "${EC2_HOST}" ] || [ -z "${EC2_USER}" ] || [ -z "${EC2_SSH_KEY_B64}" ]; then
            echo "::warning::EC2 deploy secrets not set — skipping deploy."
            exit 0
          fi

          # Write the private key
          echo "$EC2_SSH_KEY_B64" | base64 -d > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

          # Trust the host
          mkdir -p ~/.ssh
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

          SSH="ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=20"

          # ── Push the fresh checkout to EC2 (no GitHub auth on EC2 needed) ──
          echo "Syncing code to EC2..."
          rsync -az --delete \
            -e "$SSH" \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='frontend/node_modules' \
            --exclude='frontend/dist' \
            --exclude='.env' \
            --exclude='data/processed' \
            --exclude='data/interim' \
            --exclude='artifacts' \
            ./ "$EC2_USER@$EC2_HOST:/home/ubuntu/Flipkart_gridlock_2.0/"

          # ── Build frontend + restart backend on EC2 ──
          echo "Starting deployment on EC2..."
          $SSH "$EC2_USER@$EC2_HOST" "bash /home/ubuntu/deploy.sh"

      - name: Update Deployment Status (success)
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.deployment.outputs.deployment_id }},
              state: 'success',
              environment_url: 'http://${{ secrets.EC2_HOST }}',
              description: 'Deployment successful',
            });

      - name: Update Deployment Status (failure)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.deployment.outputs.deployment_id }},
              state: 'failure',
              description: 'Deployment failed',
            });
