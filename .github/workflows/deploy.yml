name: Deploy to EC2

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy over SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY_B64: ${{ secrets.EC2_SSH_KEY_B64 }}
        run: |
          set -euo pipefail

          # Skip (do not fail) if the deploy secrets aren't configured — this lets
          # pushes succeed before the EC2 host/keys are wired up.
          if [ -z "${EC2_HOST}" ] || [ -z "${EC2_USER}" ] || [ -z "${EC2_SSH_KEY_B64}" ]; then
            echo "::warning::EC2 deploy secrets not set (EC2_HOST / EC2_USER / EC2_SSH_KEY_B64) — skipping deploy."
            exit 0
          fi

          echo "$EC2_SSH_KEY_B64" | base64 -d > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

          mkdir -p ~/.ssh
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=20 \
            "$EC2_USER@$EC2_HOST" "bash /home/ubuntu/deploy.sh"
